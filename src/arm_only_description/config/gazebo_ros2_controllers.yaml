controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/GripperActionController

arm_controller:
  ros__parameters:
    joints:
      - JOINT1
      - JOINT2
      - JOINT3
      - JOINT4
      - JOINT5
      - JOINT6

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false

gripper_controller:
  ros__parameters:
    joint: JOINT7
    action_monitor_rate: 20.0
    goal_tolerance: 0.01
    max_effort: 50.0
    allow_stalling: true
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0
